name: Export Copilot PR Reports (PDF & DOCX)

on:
  workflow_dispatch:

jobs:
  export:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python deps
        run: |
          pip install --upgrade pip
          pip install requests

      - name: Install Pandoc & LaTeX (for PDF)
        run: |
          sudo apt-get update
          sudo apt-get install -y pandoc
          sudo apt-get install -y texlive-latex-recommended texlive-fonts-recommended texlive-latex-extra

      - name: Create report
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python - <<'PYCODE'
          import os, re, json, pathlib, requests, datetime, hashlib, mimetypes

          OWNER="BrianLovegrove"
          REPO="Mechanics-Best-Friend"
          OUT=pathlib.Path("export-output")
          ASSETS=OUT/"assets"
          OUT.mkdir(exist_ok=True)
          ASSETS.mkdir(exist_ok=True)

          TOKEN=os.environ["GITHUB_TOKEN"]
          GQL="https://api.github.com/graphql"
          S=requests.Session()
          S.headers.update({"Authorization": f"Bearer {TOKEN}", "Accept": "application/vnd.github+json"})

          # GraphQL queries
          PR_QUERY=f"""
          query($c:String){{
            repository(owner:"{OWNER}", name:"{REPO}") {{
              pullRequests(first:100, after:$c, states:CLOSED, orderBy:{{field:UPDATED_AT, direction:DESC}}) {{
                pageInfo {{ hasNextPage endCursor }}
                nodes {{
                  number title url merged mergedAt closedAt updatedAt createdAt
                }}
              }}
            }}
          }}
          """

          CMT_QUERY=f"""
          query($n:Int!,$c:String){{
            repository(owner:"{OWNER}", name:"{REPO}") {{
              pullRequest(number:$n) {{
                comments(first:100, after:$c) {{
                  pageInfo {{ hasNextPage endCursor }}
                  nodes {{
                    author {{ login }}
                    body
                    createdAt
                    updatedAt
                    url
                  }}
                }}
              }}
            }}
          }}
          """

          # Patterns
            # Unwanted "instruction/prompt" or promotional Copilot comments
          UNWANTED_PATTERNS = [
            "copilot instructions",
            ".github/copilot-instructions.md",
            "i can generate a .github/copilot-instructions.md",
            "open a pre-filled issue",
            "i can understand the repository better, work faster",
            "write the instructions, and then tag you"
          ]
          # Keywords typical of real change / report summaries
          REPORT_KEYWORDS = [
            "changes made","issues fixed","problem","root cause","solution","technical","implementation",
            "enhanced","results","requirements","files to modify","testing requirements",
            "before","after","migration","fix","bug","refactor","improved","added","updated"
          ]

          IMG_RE = re.compile(r'!\[([^\]]*)\]\((https?://[^\s)]+)\)', re.IGNORECASE)

          def gql(query, variables):
              r=S.post(GQL, json={"query":query, "variables":variables})
              r.raise_for_status()
              data=r.json()
              if "errors" in data:
                  raise SystemExit(data["errors"])
              return data["data"]

          def all_closed_prs():
              cursor=None
              while True:
                  data=gql(PR_QUERY, {"c":cursor})
                  conn=data["repository"]["pullRequests"]
                  for pr in conn["nodes"]:
                      yield pr
                  if not conn["pageInfo"]["hasNextPage"]:
                      break
                  cursor=conn["pageInfo"]["endCursor"]

          def pr_comments(pr_number):
              cursor=None
              while True:
                  data=gql(CMT_QUERY, {"n":pr_number, "c":cursor})
                  pr=data["repository"]["pullRequest"]
                  if pr is None:
                      return
                  conn=pr["comments"]
                  for c in conn["nodes"]:
                      yield c
                  if not conn["pageInfo"]["hasNextPage"]:
                      break
                  cursor=conn["pageInfo"]["endCursor"]

          def is_unwanted(body_lower):
              return any(pat in body_lower for pat in UNWANTED_PATTERNS)

          def score_report(body_lower):
              # Count keyword matches (distinct occurrences)
              score=0
              matched=[]
              for kw in REPORT_KEYWORDS:
                  if kw in body_lower:
                      score+=1
                      matched.append(kw)
              return score, matched

          def pick_final_copilot_comment(comments):
              # Filter to Copilot authored comments
              cands=[c for c in comments if "copilot" in (c.get("author") or {}).get("login","").lower()]
              if not cands:
                  return None, "no_copilot_comments"
              # Remove unwanted promotional ones
              filtered=[]
              for c in cands:
                  body=c.get("body") or ""
                  if not body.strip():
                      continue
                  if is_unwanted(body.lower()):
                      continue
                  filtered.append(c)
              if not filtered:
                  return None, "only_promotional_copilot_comments"

              # Score each
              enriched=[]
              for c in filtered:
                  body=c.get("body") or ""
                  body_lower=body.lower()
                  rep_score, matched=score_report(body_lower)
                  enriched.append({
                      "obj":c,
                      "rep_score":rep_score,
                      "len":len(body),
                      "updated":c["updatedAt"],
                      "matched":matched
                  })
              # Sort: highest report score, then longest length, then latest updated
              enriched.sort(key=lambda e:(e["rep_score"], e["len"], e["updated"]), reverse=True)
              chosen=enriched[0]
              reason=f"score={chosen['rep_score']} len={chosen['len']} matched={chosen['matched']}"
              return chosen["obj"], reason

          def guess_ext(content_type, url):
              if content_type:
                  ext=mimetypes.guess_extension(content_type.split(";")[0].strip()) or ""
                  if ext in ("",".jpe"):
                      if "png" in content_type: return ".png"
                      if "jpeg" in content_type or "jpg" in content_type: return ".jpg"
                      if "gif" in content_type: return ".gif"
                      if "webp" in content_type: return ".webp"
                  if ext:
                      return ext
              # fallback to url
              base=url.split("?")[0].rsplit("/",1)[-1]
              if "." in base:
                  part=base.rsplit(".",1)[-1].lower()
                  if 1 <= len(part) <= 5:
                      return "."+part
              return ".png"

          def download_and_rewrite(pr_number, body):
              matches=list(IMG_RE.finditer(body))
              if not matches:
                  return body
              pr_dir=ASSETS/f"pr-{pr_number}"
              pr_dir.mkdir(parents=True, exist_ok=True)
              new_body=body
              for idx,m in enumerate(matches, start=1):
                  alt,url=m.group(1),m.group(2)
                  try:
                      resp=S.get(url, timeout=30)
                      resp.raise_for_status()
                      ext=guess_ext(resp.headers.get("Content-Type",""), url)
                      h=hashlib.sha1(url.encode()).hexdigest()[:8]
                      fname=f"img{idx}-{h}{ext}"
                      (pr_dir/fname).write_bytes(resp.content)
                      repl=f"![{alt}](assets/pr-{pr_number}/{fname})"
                      new_body=new_body.replace(m.group(0), repl, 1)
                  except Exception as e:
                      print(f"[WARN] PR#{pr_number} image download failed: {e}")
              return new_body

          def iso(ts):
              if not ts: return "N/A"
              try:
                  return datetime.datetime.fromisoformat(ts.replace("Z","+00:00")).strftime("%Y-%m-%d %H:%M:%S %Z")
              except Exception:
                  return ts

          prs=list(all_closed_prs())

          # Sort newest closed first
          def sort_key(pr):
              return pr.get("closedAt") or pr.get("mergedAt") or pr.get("updatedAt") or pr.get("createdAt")
          prs_sorted=sorted(prs, key=sort_key, reverse=True)

          sections=[]
          processed=0
          skipped=0

          for pr in prs_sorted:
              number=pr["number"]
              all_comments=list(pr_comments(number))
              chosen, reason = pick_final_copilot_comment(all_comments)
              if not chosen:
                  skipped+=1
                  print(f"[SKIP] PR#{number} ({pr['title']}) -> {reason}")
                  continue
              print(f"[OK]   PR#{number} picked comment {chosen['url']} ({reason})")

              body=chosen.get("body") or ""
              body=download_and_rewrite(number, body)

              sec=[
                  f"# PR #{number}: {pr['title']}",
                  f"Closed: {iso(pr.get('closedAt'))}",
                  f"Merged: {'Yes' if pr['merged'] else 'No'} (MergedAt: {iso(pr.get('mergedAt'))})",
                  f"PR URL: {pr['url']}",
                  f"Copilot Comment URL: {chosen['url']}",
                  "",
                  body.strip(),
                  "",
                  "\\newpage",
                  ""
              ]
              sections.append("\n".join(sec))
              processed+=1

          # Build master Markdown
          header=[
              "---",
              "title: Copilot PR Final Reports",
              f"date: {datetime.datetime.utcnow().strftime('%Y-%m-%d %H:%M:%S UTC')}",
              "---",
              "",
              f"Repository: {OWNER}/{REPO}",
              f"Total PRs with Copilot final report: {processed}",
              f"Skipped (no qualifying Copilot report): {skipped}",
              "",
              "---",
              ""
          ]
          full_md="\n".join(header+sections)
          md_path=OUT/"Copilot-Closed-PR-Reports.md"
          md_path.write_text(full_md, encoding="utf-8")

          # Basic CSS
          css=(OUT/"report.css")
          css.write_text("""
          body { font-family: Arial, sans-serif; line-height:1.38; max-width:960px; margin:0 auto; padding:1.3rem; }
          h1 { border-bottom:2px solid #444; padding-bottom:.3rem; margin-top:2.2rem; }
          img { max-width:100%; height:auto; border:1px solid #ccc; padding:3px; background:#fafafa; margin:8px 0; }
          code, pre { background:#f4f4f4; }
          """, encoding="utf-8")

          print("Generating HTML (embedded)...")
          os.chdir(OUT)
          os.system("pandoc Copilot-Closed-PR-Reports.md --embed-resources --standalone --css=report.css -o Copilot-Closed-PR-Reports.html")

          print("Generating PDF...")
          os.system("pandoc Copilot-Closed-PR-Reports.md -o Copilot-Closed-PR-Reports.pdf --pdf-engine=xelatex --resource-path='.'")

          print("Generating DOCX...")
          os.system("pandoc Copilot-Closed-PR-Reports.md -o Copilot-Closed-PR-Reports.docx")

          print("DONE: processed =", processed, "skipped =", skipped)
          PYCODE

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: copilot-pr-reports
          path: export-output/
          if-no-files-found: error
          retention-days: 14
